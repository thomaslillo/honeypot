name: CI-24-Hour-3

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Decide whether to commit today
        id: schedule_gate
        run: |
          DAY_OF_WEEK=$(date +%u)
          if [ "$DAY_OF_WEEK" -lt 6 ]; then
            echo "Weekday detected. Proceeding with commit steps."
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RANDOM_NUMBER=$((RANDOM % 3 + 1))
          echo "Weekend detected. Generated number: $RANDOM_NUMBER"
          if [ "$RANDOM_NUMBER" -eq 1 ]; then
            echo "Weekend commit chance hit. Proceeding."
            echo "should_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Weekend commit skipped."
            echo "should_commit=false" >> "$GITHUB_OUTPUT"
          fi

      # Reference the major version of a release
      - uses: actions/checkout@v4
        if: steps.schedule_gate.outputs.should_commit == 'true'
        with:
          persist-credentials: false # This is important to avoid using the default token

      - name: Set up git user
        if: steps.schedule_gate.outputs.should_commit == 'true'
        run: |
          git config user.name ${{ secrets.GIT_USER }}
          git config user.email ${{ secrets.GIT_EMAIL }}

      - name: Authenticate with GitHub token
        if: steps.schedule_gate.outputs.should_commit == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

      - name: Run a one-line script
        if: steps.schedule_gate.outputs.should_commit == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo " print('hello world') " >> important_file.txt
          git add important_file.txt
          git commit -m "Always green!"
          git push
